<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <!-- Background Rounded Rect in Twilight Blue #17212D -->
  <rect width="48" height="48" rx="14" fill="#17212D" />
  
  <!-- Subtle inner gradient border for premium glow -->
  <rect x="0.75" y="0.75" width="46.5" height="46.5" rx="13.25" stroke="url(#glow-grad)" stroke-width="1.5" stroke-opacity="0.6" />
  
  <!-- Stylized F representing Funding & Growth in Teal and White -->
  <!-- Vertical stem (White) -->
  <rect x="14" y="12" width="5.5" height="24" rx="2.75" fill="#FFFFFF" />
  
  <!-- Top bar (Teal #34BED5) -->
  <rect x="19.5" y="12" width="14.5" height="5.5" rx="2.75" fill="#34BED5" />
  
  <!-- Middle bar (Teal #34BED5) -->
  <rect x="19.5" y="21" width="9.5" height="5" rx="2.5" fill="#34BED5" />
  
  <!-- Dynamic growth dot (Teal #34BED5) -->
  <circle cx="32" cy="33" r="3" fill="#34BED5" />

  <defs>
    <linearGradient id="glow-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34BED5" />
      <stop offset="100%" stop-color="#17212D" />
    </linearGradient>
  </defs>
</svg>